[runtime]
data_dir = "./data"
log_dir = "./logs"
max_retries = 3
poll_interval_ms = 400

[llm]
enabled = true
provider = "default"

[providers.default]
protocol = "openai_compatible"
provider_name = "nvidia"
base_url = "https://integrate.api.nvidia.com/v1"
api_key = "YOUR_API_KEY"
model = "nvidia/qwen/qwen3.5-397b-a17b"
timeout_secs = 60
max_tokens = 2048
temperature = 0.2
