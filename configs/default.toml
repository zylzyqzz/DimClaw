[agent]
name = "DimClaw"
description = "我的 AI 助手"

[provider]
type = "openai_compatible"
name = "default"
api_key = "${OPENAI_API_KEY}"
endpoint = "https://api.openai.com/v1"
model = "gpt-4o-mini"
timeout = 60
max_tokens = 2048
temperature = 0.7

[channels.feishu]
enabled = false
app_id = ""
app_secret = ""
verify_token = ""

[channels.telegram]
enabled = false
bot_token = ""

[channels.mode]
default = "single"
single_agent = "Planner"
multi_agents = ["Planner", "Executor", "Verifier", "Recovery"]

[memory]
backend = "sqlite"
path = "./data/memory.db"
vector_search = true
fts_search = true

[security]
super_mode = true
audit_log = true

[tools]
allow_all = true
