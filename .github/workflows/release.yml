name: Release
on:
  push:
    tags:
      - 'v*'
jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build release
        run: cargo build --release
      - name: List artifacts
        run: ls -la target/release
        shell: bash
      - name: Prepare Linux artifact
        if: matrix.os == 'ubuntu-latest'
        run: mv target/release/dimclaw target/release/dimclaw-linux-x86_64
      - name: Prepare macOS artifact
        if: matrix.os == 'macos-latest'
        run: mv target/release/dimclaw target/release/dimclaw-macos-x86_64
      - name: Prepare Windows artifact
        if: matrix.os == 'windows-latest'
        run: mv target/release/dimclaw.exe target/release/dimclaw-windows-x86_64.exe
        shell: pwsh
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ${{ matrix.os == 'ubuntu-latest' && 'target/release/dimclaw-linux-x86_64' || '' }}
            ${{ matrix.os == 'windows-latest' && 'target/release/dimclaw-windows-x86_64.exe' || '' }}
            ${{ matrix.os == 'macos-latest' && 'target/release/dimclaw-macos-x86_64' || '' }}
