name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      - name: Build release
        run: cargo build --release
      - name: Publish release binary
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ matrix.os == 'ubuntu-latest' && 'dimclaw-linux-x86_64' || matrix.os == 'windows-latest' && 'dimclaw-windows-x86_64.exe' || 'dimclaw-macos-x86_64' }}
          files: target/release/dimclaw${{ matrix.os == 'windows-latest' && '.exe' || '' }}
